<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SONIC GLOBE — Dig the World's Music</title>
  <meta name="description" content="Explore iconic music from every country across time. Click a country on the 3D globe to discover its music history.">
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Header -->
<div id="header">
  <div>
    <a href="index.html" id="logo">SONIC<span>GLOBE</span></a>
    <div id="tagline">모든 시대의 소리가 당신을 기다립니다</div>
  </div>
  <div id="header-right">
    <div id="year-panel">
      <div id="year-label">Select Year</div>
      <div id="year-selector">
        <button class="year-btn" id="prev-year">◀</button>
        <button id="current-year" type="button" aria-haspopup="dialog" aria-expanded="false">1990</button>
        <button class="year-btn" id="next-year">▶</button>
      </div>
      <div id="year-jump-hint">Jump by decade. Click the year for full selection.</div>
      <div id="year-picker" aria-hidden="true">
        <div id="year-picker-header">
          <span>Choose a year</span>
          <button id="year-picker-close" type="button" aria-label="Close year picker">✕</button>
        </div>
        <div id="year-grid"></div>
      </div>
    </div>
    <button id="random-btn" title="Random Country">
      <svg id="dice-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="3" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="7.5" cy="7.5" r="1.5" fill="currentColor"/>
        <circle cx="16.5" cy="7.5" r="1.5" fill="currentColor"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
        <circle cx="7.5" cy="16.5" r="1.5" fill="currentColor"/>
        <circle cx="16.5" cy="16.5" r="1.5" fill="currentColor"/>
      </svg>
      <span>RANDOM</span>
    </button>
  </div>
</div>


<canvas id="globe-canvas"></canvas>

<div id="tooltip"></div>

<div id="side-info">
  <div id="country-nav">
    <div id="country-list-title">EXPLORE COUNTRIES</div>
    <div id="country-list"></div>
  </div>
</div>

<div id="country-labels"></div>

<div id="instruction">✦ CLICK A COUNTRY TO DIG ITS MUSIC &nbsp;·&nbsp; DRAG TO ROTATE ✦</div>

<!-- Info Card -->
<div id="info-card">
  <div id="card-accent-bar"></div>
  <button id="card-close">✕</button>
  <div id="card-loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Digging...</div>
  </div>
  <div id="card-body" style="display:none;">
    <div id="card-meta">
      <span id="card-country"></span>
      <span id="card-year"></span>
    </div>
    <div id="card-song"></div>
    <div id="card-artist"></div>
    <div class="card-divider"></div>
    <div class="card-meta-grid">
      <div>
        <div class="meta-label">Album</div>
        <div class="meta-value" id="card-album">—</div>
      </div>
      <div>
        <div class="meta-label">Release</div>
        <div class="meta-value" id="card-release">—</div>
      </div>
    </div>
    <div id="card-genres"></div>
    <div id="card-desc"></div>
  </div>
</div>
<!-- Player Bar -->
<div id="player-bar">
  <div id="yt-wrap" class="visible">
    <button id="yt-close" title="닫기">✕</button>
    <div id="yt-iframe"></div>
  </div>

  <div id="player-track">
    <div id="player-meta">
      <span id="player-country-tag"></span>
      <span id="player-year-tag"></span>
    </div>
    <div id="player-song-name">클릭하여 음악 탐색</div>
    <div id="player-artist-name">SONIC GLOBE</div>
  </div>

  <div id="player-center-block">
    <div id="player-waveform">
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
      <div class="wv-bar"></div>
    </div>
    <button id="btn-play-pause" class="ctrl-btn" disabled>
      <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" width="26" height="26">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
      <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="26" height="26" style="display:none">
        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
      </svg>
    </button>
    <div id="player-seek-row">
      <span id="time-current">0:00</span>
      <div id="seekbar">
        <div id="seekbar-fill"></div>
        <div id="seekbar-thumb"></div>
      </div>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <div id="player-right-block">
    <div id="player-no-audio">NO AUDIO</div>
    <button id="btn-mute" class="ctrl-btn" title="음소거">
      <svg id="icon-vol-on" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="1.8" fill="none"/>
      </svg>
      <svg id="icon-vol-off" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" style="display:none">
        <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
        <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="1.8"/>
        <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="1.8"/>
      </svg>
    </button>
    <input type="range" id="volume-slider" min="0" max="100" value="70">
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script type="module" src="script.js"></script>
</body>
</html>
