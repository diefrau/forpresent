<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SONIC GLOBE — Dig the World's Music</title>
  <meta name="description" content="Explore iconic music from every country across time. Click a country on the 3D globe to discover its music history.">
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Header -->
<div id="header">
  <div>
    <div id="logo">SONIC<span>GLOBE</span></div>
    <div id="tagline">Dig the world's music through time</div>
  </div>
  <div id="header-right">
    <div id="year-panel">
      <div id="year-label">Select Year</div>
      <div id="year-selector">
        <button class="year-btn" id="prev-year">◀</button>
        <div id="current-year">1990</div>
        <button class="year-btn" id="next-year">▶</button>
      </div>
    </div>
    <button id="random-btn" title="Random Country">
      <svg id="dice-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="3" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="7.5" cy="7.5" r="1.5" fill="currentColor"/>
        <circle cx="16.5" cy="7.5" r="1.5" fill="currentColor"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
        <circle cx="7.5" cy="16.5" r="1.5" fill="currentColor"/>
        <circle cx="16.5" cy="16.5" r="1.5" fill="currentColor"/>
      </svg>
      <span>RANDOM</span>
    </button>
  </div>
</div>


<canvas id="globe-canvas"></canvas>

<div id="tooltip"></div>

<div id="side-info">
  <div id="country-nav">
    <div id="country-list-title">EXPLORE COUNTRIES</div>
    <div id="country-list"></div>
  </div>
</div>

<div id="country-labels"></div>

<div id="instruction">✦ CLICK A COUNTRY TO DIG ITS MUSIC &nbsp;·&nbsp; DRAG TO ROTATE ✦</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-accent-bar"></div>
    <button id="modal-close">ESC / CLOSE</button>

    <div id="modal-loading">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">Digging the archives...</div>
    </div>

    <div id="modal-body" style="display:none;">
      <div id="modal-country-badge"></div>
      <div id="modal-year-badge"></div>
      <div id="modal-song-title"></div>
      <div id="modal-artist"></div>
      <div class="modal-divider"></div>
      <div class="meta-grid">
        <div>
          <div class="meta-label">Album</div>
          <div class="meta-value" id="meta-album">—</div>
        </div>
        <div>
          <div class="meta-label">Release Date</div>
          <div class="meta-value" id="meta-release">—</div>
        </div>
      </div>
      <div id="modal-genres"></div>
      <div id="modal-desc"></div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script type="module" src="script.js"></script>
</body>
</html>
